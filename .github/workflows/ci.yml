name: CI

# Trigger only on PRs and direct pushes to main.
# Without restricting `push`, every commit on a PR branch fires CI twice (once
# from the `push` event, once from `pull_request`). Restricting `push` to main
# gives us: PR runs (via pull_request) + post-merge runs (via push to main).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load .env.example into job env
        run: |
          # Strip comments + blank lines, append KEY=VALUE pairs to $GITHUB_ENV
          # so subsequent steps see them as ordinary env vars.
          grep -Ev '^\s*(#|$)' .env.example >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn
          cache-dependency-path: app/yarn.lock

      - name: Install dependencies
        working-directory: app
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: app
        run: npx zenstack generate && npx prisma generate

      - name: Build
        working-directory: app
        run: yarn build
