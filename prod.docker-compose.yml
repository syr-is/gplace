services:
  # GPlace Application (Production)
  # Postgres and Redis are provided by Dokploy's managed services —
  # wire DATABASE_URL and REDIS_URL through env at deploy time. Both
  # connection strings MUST include credentials; the app refuses to start
  # without them. For Redis, ensure your Dokploy Redis service is launched
  # with --requirepass (or equivalent ACL) — the official redis image does
  # NOT enforce auth from the REDIS_PASSWORD env var alone.
  gplace-app:
    build:
      context: .
      dockerfile: docker/prod/app.dockerfile
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-5173}
      - APP_ORIGIN=${APP_ORIGIN:?APP_ORIGIN required (e.g. https://app.gplace.ink)}
      - PROD=true
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL required (managed Postgres connection string)}
      - REDIS_URL=${REDIS_URL:?REDIS_URL required (managed Redis connection string)}
      - PUBLIC_CURRENT_BOARD=${PUBLIC_CURRENT_BOARD:-main}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /app/.prisma
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
